<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .overlay-content {
            text-align: center;
            padding: 40px;
            background: rgba(26, 26, 46, 0.9);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
        }
        .overlay-text {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #00ffff;
            font-family: 'Segoe UI', sans-serif;
        }
        .instructions {
            color: #aaa;
            font-size: 1.1rem;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay">
        <div class="overlay-content">
            <div class="overlay-text">Press any key to continue</div>
            <div class="instructions">Opens game vault in this tab</div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', function(e) {
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.remove();
                window.location.href = 'about:blank';
                const faviconUrl = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Google_Classroom_Logo.svg/960px-Google_Classroom_Logo.svg.png';
                const iframeHtml = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Home</title>
                        <link rel="icon" href="${faviconUrl}" type="image/png">
                    </head>
                    <body style="margin:0;overflow:hidden">
                        <iframe src="https://0706970-collab.github.io/game-vault/" 
                                style="width:100%;height:100vh;border:none">
                        </iframe>
                    </body>
                    </html>`;
                window.document.open();
                window.document.write(iframeHtml);
                window.document.close();
            }
        });
    </script>
</body>
</html>
